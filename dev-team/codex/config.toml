# Codex configuration for the dev-team project.
# Place this at the project root as .codex/config.toml (trusted projects),
# or merge the [mcp_servers.*] blocks into ~/.codex/config.toml.

# Sensible defaults; tune to taste.
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.fetch]
command = "uvx"
args = ["mcp-server-fetch"]

# Code-intelligence MCP: indexes a codebase into a per-project knowledge graph.
# Install the binary first (see README): it lands in ~/.local/bin/codebase-memory-mcp.
[mcp_servers.codebase-memory]
command = "${HOME}/.local/bin/codebase-memory-mcp"
args = []
