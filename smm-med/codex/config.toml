# Codex configuration for the smm-med project.
# Place this at the project root as .codex/config.toml (trusted projects),
# or merge the [mcp_servers.*] blocks into ~/.codex/config.toml.

# Sensible defaults; tune to taste.
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[mcp_servers.max-mcp]
command = "uv"
args = ["run", "--directory", "/path/to/max-mcp", "python", "-m", "max_mcp.server"]
